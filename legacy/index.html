<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Manager Pro Max V13</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo" onclick="UI.changeView('catalog')">🎬 Movie<span>Manager</span></div>
        <div id="stats" class="stats">Просмотрено: 0</div>
        <nav>
            <button onclick="UI.changeView('catalog')">Каталог</button>
            <button onclick="UI.changeView('categories')">Категории</button>
            <button onclick="UI.changeView('watched')">История</button>
            <button onclick="UI.changeView('wheel')" class="btn-accent">🎡 Колесо</button>
        </nav>
    </header>

    <main id="app"></main>

    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal-box">
            <h3 id="modal-title"></h3>
            <div id="modal-body"></div>
            <div class="modal-footer">
                <button onclick="UI.closeModal()" class="action">Отмена</button>
                <button id="modal-ok-btn" class="action btn-accent">ОК</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
