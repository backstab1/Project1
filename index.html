<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0a0b0f">
    <meta
      name="description"
      content="CineVault — локальная библиотека фильмов и колесо случайного выбора."
    >
    <title>CineVault</title>
    <script>
      (() => {
        try {
          const saved = localStorage.getItem("cinevault-theme");
          const theme = saved === "light" || saved === "dark"
            ? saved
            : matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
        } catch {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
    <link rel="stylesheet" href="./src/styles.css">
  </head>
  <body>
    <div id="app">
      <div class="boot-screen" role="status">
        <div class="boot-screen__mark">CV</div>
        <p>Открываем хранилище CineVault…</p>
      </div>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
